<link href="test.css" />

<style>
  .box {
    background-color: rgb(30, 30, 60);
    width: 340px;
    height: 400px;
    align-items: center;
    text-align: center;
    border: 1 #aaaaff44;
    overflow: scroll;
  }
  .box:hover {
    background-color: rgb(50, 50, 90);
  }
  h3 {
    display: block;
    margin-bottom: 8;
  }
  .debug-area {
    background-color: rgb(80, 20, 20);
    display: block;
    padding: 4;
    margin-top: 4;
  }
  .player-row {
    display: block;
    margin: 2;
    text-align: left;
  }
  .ghost {
    visibility: hidden;
  }
</style>

<script type="text">
  self.counter    = 0
  self.playerName = 'Aventureiro'
  self.showDebug  = false
  self.items      = {'Espada', 'Escudo', 'Poção', 'Elmo'}
  self.players    = {
    { name = 'Guerreiro', lookType = 128 },
    { name = 'Mago',      lookType = 136 },
    { name = 'Arqueiro',  lookType = 150 },
  }
</script>

<html>
<div class="box" placement="center">

  <!-- 1. Template expression simples -->
  <h3>HTML/CSS — OTC V8 ✓</h3>

  <!-- 2. *text binding -->
  <label *text="'Olá, ' .. tostring(self.playerName) .. '!'" />

  <!-- 3. Template inline -->
  <label>Contador: {{self.counter}}</label>
  <button onclick="self:increment()">+1</button>

  <!-- 4. *if — não ocupa espaço quando false -->
  <div *if="self.showDebug" class="debug-area">
    DEBUG — counter={{self.counter}}, nome={{self.playerName}}
  </div>
  <button onclick="self:toggleDebug()">Toggle Debug (*if)</button>

  <!-- 5. *visible — ocupa espaço mas fica invisível -->
  <label class="ghost" *visible="false">[ invisível mas ocupa espaço ]</label>

  <!-- 6. *for com index alias -->
  <label>Itens:</label>
  <div *for="local item in self.items; local i = index">
    <label>{{i + 1}}. {{item}}</label>
  </div>
  <button onclick="self:addItem()">+Item (*for reativo)</button>

  <!-- 7. *for com remoção e add -->
  <label>Jogadores:</label>
  <div *for="local p in self.players">
    <div class="player-row">
      <label>{{p.name}}</label>
      <button onclick="self:removePlayer(index)">X</button>
    </div>
  </div>
  <button onclick="self:addPlayer()">+Jogador</button>

  <!-- 8. Tabela -->
  <table>
    <thead><tr><th>Item</th><th>Qtd</th></tr></thead>
    <tbody>
      <tr><td>Espada</td><td>1</td></tr>
      <tr><td>Poção</td><td>5</td></tr>
    </tbody>
  </table>

  <!-- 9. *value (Widget → Lua) -->
  <input type="text" *value="self.playerName" />
  <label *text="'Nome: ' .. tostring(self.playerName)" />

  <!-- 10. Fechar -->
  <button onclick="self:close()">Fechar</button>

</div>
</html>
